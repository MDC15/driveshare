<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveShare</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--border:#2e3348;--text:#e1e4f0;--text2:#8b90a8;--accent:#6c8cff;--accent2:#5a7ae6;--danger:#ff5c5c;--success:#4ade80;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,.4);--sidebar-w:240px;--sidebar-collapsed:60px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:16px;display:flex;align-items:center;gap:8px}
header h1 .logo{color:var(--accent);font-size:20px}
.header-info{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text2)}
.hostname-box{background:var(--surface2);border:1px solid var(--border);padding:4px 12px;border-radius:6px;font-family:monospace;font-size:12px;color:var(--accent)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .25s ease;flex-shrink:0;overflow:hidden}
.sidebar.collapsed{width:var(--sidebar-collapsed)}
.sidebar-header{padding:12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);min-height:48px}
.sidebar-header .toggle-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:4px;border-radius:6px;transition:color .2s;line-height:1}
.sidebar-header .toggle-btn:hover{color:var(--text)}
.sidebar-header .sidebar-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden}
.sidebar.collapsed .sidebar-title{display:none}
.sidebar-nav{flex:1;padding:8px}
.sidebar-nav .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text2);transition:all .15s;white-space:nowrap;overflow:hidden;border:none;background:none;width:100%;text-align:left;font-size:14px}
.sidebar-nav .nav-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-nav .nav-item.active{background:var(--surface2);color:var(--accent)}
.sidebar-nav .nav-item .nav-icon{font-size:20px;flex-shrink:0;width:24px;text-align:center}
.sidebar-nav .nav-item .nav-label{overflow:hidden;text-overflow:ellipsis}
.sidebar.collapsed .nav-item .nav-label{display:none}
.main-content{flex:1;overflow-y:auto;padding:20px 24px}
.tab-view{display:none}
.tab-view.active{display:block}
.page-header{margin-bottom:16px}
.page-header h2{font-size:20px;margin-bottom:4px}
.page-header p{color:var(--text2);font-size:14px}
.shares-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:16px}
.share-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s}
.share-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,140,255,.15)}
.share-card h3{font-size:16px;margin-bottom:4px}
.share-card p{font-size:13px;color:var(--text2)}
.share-links{margin-top:14px;display:flex;flex-direction:column;gap:6px}
.share-links a{font-size:13px;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg);border-radius:6px;transition:all .2s;word-break:break-all;flex:1;min-width:0}
.share-links a:hover{background:var(--surface2);text-decoration:underline}
.share-links .link-label{font-size:11px;color:var(--text2);text-transform:uppercase}
.share-links .link-row{display:flex;align-items:center;gap:6px}
.share-links .copy-btn{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s;line-height:1}
.share-links .copy-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--surface)}
#file-browser{display:none}
#file-browser.active{display:block}
.browser-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.browser-header h2{font-size:18px}
.browser-header .back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s}
.browser-header .back-btn:hover{border-color:var(--accent)}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text2);margin-bottom:16px;flex-wrap:wrap}
.breadcrumb a{color:var(--accent);text-decoration:none;cursor:pointer}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb .sep{color:var(--border)}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.toolbar button{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:6px}
.toolbar button:hover{border-color:var(--accent);background:var(--surface)}
.toolbar input[type=file]{display:none}
.file-table{width:100%;border-collapse:collapse}
.file-table th{text-align:left;padding:10px 14px;font-size:12px;text-transform:uppercase;color:var(--text2);border-bottom:1px solid var(--border);font-weight:600}
.file-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:14px}
.file-table tr{cursor:pointer;transition:background .2s}
.file-table tr:hover{background:var(--surface2)}
.file-table .file-icon{margin-right:10px;font-size:16px}
.file-table .file-name{display:flex;align-items:center}
.file-table .file-size{color:var(--text2);font-size:13px}
.file-table .file-date{color:var(--text2);font-size:13px}
.file-table .file-actions{display:flex;gap:6px}
.file-table .file-actions button{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .2s}
.file-table .file-actions button:hover{color:var(--text);border-color:var(--accent)}
.file-table .file-actions .delete-btn:hover{color:var(--danger);border-color:var(--danger)}
.device-table{width:100%;border-collapse:collapse;margin-top:12px}
.device-table th{text-align:left;padding:10px 14px;font-size:12px;text-transform:uppercase;color:var(--text2);border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}
.device-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.device-table .device-ip{font-family:monospace;color:var(--accent);font-size:12px}
.device-table .device-hostname{color:var(--text);font-weight:500}
.device-table .device-name{color:var(--text2);font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.device-table .device-status{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.device-table .device-status.allowed{background:rgba(74,222,128,.15);color:var(--success)}
.device-table .device-status.blocked{background:rgba(255,92,92,.15);color:var(--danger)}
.device-table .perm-check{width:17px;height:17px;cursor:pointer;accent-color:var(--accent)}
.device-table .block-btn{padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .2s;white-space:nowrap}
.device-table .block-btn:hover{border-color:var(--accent)}
.device-table .block-btn.blocked{color:var(--danger);border-color:var(--danger)}
.device-table .block-btn.blocked:hover{background:rgba(255,92,92,.1)}
.empty-state{text-align:center;padding:40px;color:var(--text2)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:var(--text2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal h3{margin-bottom:16px;font-size:17px}
.modal input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:16px;outline:none}
.modal input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions button{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s}
.modal-actions .btn-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.modal-actions .btn-cancel:hover{color:var(--text)}
.modal-actions .btn-primary{background:var(--accent);border:none;color:#fff;font-weight:600}
.modal-actions .btn-primary:hover{background:var(--accent2)}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:300}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;margin-top:8px;box-shadow:var(--shadow);animation:slideIn .3s ease;font-size:14px;display:flex;align-items:center;gap:10px}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger)}
.toast .toast-icon{font-size:18px}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* Realtime */
.realtime-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:16px}
.rt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s;position:relative}
.rt-card.online{border-color:rgba(74,222,128,.3)}
.rt-card .rt-indicator{width:10px;height:10px;border-radius:50%;position:absolute;top:12px;right:12px}
.rt-card .rt-indicator.online{background:var(--success);box-shadow:0 0 8px rgba(74,222,128,.4)}
.rt-card .rt-indicator.offline{background:var(--text2)}
.rt-card .rt-hostname{font-size:16px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.rt-card .rt-ip{font-family:monospace;font-size:13px;color:var(--accent);margin-bottom:8px}
.rt-card .rt-agent{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rt-card .rt-time{font-size:11px;color:var(--text2);margin-top:6px}
.rt-counter{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:14px}
.rt-counter .count{font-size:24px;font-weight:700;color:var(--success)}
.rt-counter .label{color:var(--text2)}
</style>
</head>
<body>

<header>
  <h1><span class="logo">◉</span> DriveShare</h1>
  <div class="header-info">
    <span>Host:</span>
    <span class="hostname-box" id="hostname-display">loading...</span>
    <span style="width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block"></span>
    <span>Running</span>
  </div>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Navigation</span>
      <button class="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" onclick="switchTab('drives')" id="nav-drives">
        <span class="nav-icon">🗄</span>
        <span class="nav-label">Drives</span>
      </button>
      <button class="nav-item" onclick="switchTab('devices')" id="nav-devices">
        <span class="nav-icon">📱</span>
        <span class="nav-label">Device Management</span>
      </button>
    </div>
  </div>

  <div class="main-content">
    <div id="view-drives" class="tab-view active">
      <div id="dashboard-view">
        <div class="page-header">
          <h2>Drives</h2>
          <p>Click a drive to browse files, or share the links with other devices on your network</p>
        </div>
        <div class="shares-grid" id="shares-grid"></div>
      </div>
      <div id="file-browser">
        <div class="browser-header">
          <button class="back-btn" onclick="showDashboard()">← Back</button>
          <h2 id="current-share-name"></h2>
        </div>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="toolbar">
          <button onclick="document.getElementById('upload-input').click()">📤 Upload</button>
          <input type="file" id="upload-input" multiple onchange="uploadFiles(this.files)">
          <button onclick="showNewFolderModal()">📁 New Folder</button>
        </div>
        <div id="file-list"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <div id="view-devices" class="tab-view">
      <div class="page-header">
        <h2>Device Management</h2>
        <p>Manage connected devices — live status, permissions, and block/unblock</p>
      </div>
      <div id="realtime-section"><div class="loading">Loading...</div></div>
      <div style="margin-top:24px"><div id="devices-list"><div class="loading">Loading...</div></div></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<div id="modal-container"></div>

<script>
let currentShare = '';
let currentPath = '';
let hostname = 'localhost';
let port = '8080';
let sidebarCollapsed = false;
let rtInterval = null;

(async function initServerIp() {
  try {
    const res = await fetch('/api/ip');
    if (res.ok) {
      const data = await res.json();
      hostname = data.ip || hostname;
      port = String(data.port) || port;
    }
  } catch (_) {}
  document.getElementById('hostname-display').textContent = hostname + ':' + port;
})();

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
}

async function api(path, opts = {}) {
  const res = await fetch(path, opts);
  return res;
}

function switchTab(name) {
  document.querySelectorAll('.tab-view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'devices') {
    loadDevices();
    startDevicePolling();
  } else {
    stopDevicePolling();
  }
}

function startDevicePolling() {
  loadRealtime();
  if (rtInterval) clearInterval(rtInterval);
  rtInterval = setInterval(() => {
    loadRealtime();
    loadDevices();
  }, 3000);
}

function stopDevicePolling() {
  if (rtInterval) { clearInterval(rtInterval); rtInterval = null; }
}

// ---- Drives ----
async function loadShares() {
  try {
    const res = await api('/api/shares');
    if (!res.ok) throw new Error('Failed to load');
    const shares = await res.json();
    const grid = document.getElementById('shares-grid');
    grid.innerHTML = '';
    if (shares.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">📁</div>No drives configured</div>';
      return;
    }
    shares.forEach(s => {
      const card = document.createElement('div');
      card.className = 'share-card';
      const shareUrl = `http://${hostname}:${port}/${esc(s.name)}/`;
      const apiUrl = `http://${hostname}:${port}/api/files/${esc(s.name)}`;
      card.innerHTML = `<h3>🗄 ${esc(s.name)}</h3><p>${esc(s.description || 'No description')}</p><div class="share-links"><span class="link-label">Share links:</span><div class="link-row"><a href="${esc(shareUrl)}" target="_blank">🔗 ${esc(shareUrl)}</a><button class="copy-btn" data-url="${esc(shareUrl)}" title="Copy link">📋</button></div><div class="link-row"><a href="${esc(apiUrl)}" target="_blank">🔗 ${esc(apiUrl)}</a><button class="copy-btn" data-url="${esc(apiUrl)}" title="Copy link">📋</button></div></div>`;
      card.onclick = (e) => { if (!e.target.closest('a')) browseShare(s.name); };
      grid.appendChild(card);
    });
  } catch (e) {
    showToast('Failed to load drives: ' + e.message, 'error');
  }
}

function showDashboard() {
  document.getElementById('dashboard-view').style.display = 'block';
  document.getElementById('file-browser').classList.remove('active');
}

document.addEventListener('click', function(e) {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  e.stopPropagation();
  const url = btn.getAttribute('data-url');
  if (!url) return;
  const ta = document.createElement('textarea');
  ta.value = url;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  ta.style.top = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('Copied!', 'success');
  } catch (_) {
    showToast('Copy failed', 'error');
  }
  ta.remove();
});

loadShares();

async function browseShare(name) {
  currentShare = name;
  currentPath = '';
  document.getElementById('dashboard-view').style.display = 'none';
  document.getElementById('file-browser').classList.add('active');
  document.getElementById('current-share-name').textContent = name;
  await loadFiles();
}

async function loadFiles() {
  const el = document.getElementById('file-list');
  el.innerHTML = '<div class="loading">Loading...</div>';
  updateBreadcrumb();
  try {
    const shareEnc = encodeURIComponent(currentShare);
    const pathEnc = currentPath ? currentPath.split('/').map(p => encodeURIComponent(p)).join('/') : '';
    const url = pathEnc ? `/api/files/${shareEnc}/${pathEnc}` : `/api/files/${shareEnc}`;
    const res = await api(url);
    if (!res.ok) throw new Error('Failed to load files');
    const files = await res.json();
    renderFiles(files);
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div>Error: ${esc(e.message)}</div>`;
  }
}

function renderFiles(files) {
  const el = document.getElementById('file-list');
  if (files.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📂</div>This folder is empty</div>';
    return;
  }
  let html = '<table class="file-table"><thead><tr><th>Name</th><th>Size</th><th>Modified</th><th></th></tr></thead><tbody>';
  files.forEach(f => {
    const icon = f.is_dir ? '📁' : getFileIcon(f.name);
    const size = f.is_dir ? '—' : formatSize(f.size);
    html += `<tr class="${f.is_dir ? 'dir-row' : ''}">
      <td class="file-name" onclick="${f.is_dir ? `navigateTo('${esc(f.name)}')` : `downloadFile('${esc(f.name)}')`}">
        <span class="file-icon">${icon}</span>${esc(f.name)}
      </td>
      <td class="file-size">${size}</td>
      <td class="file-date">${f.modified || '—'}</td>
      <td class="file-actions">
        ${f.is_dir ? `<button onclick="event.stopPropagation();downloadZip('${esc(f.name)}')" title="Download as ZIP">📦</button>` : `<button onclick="event.stopPropagation();downloadFile('${esc(f.name)}')">⬇</button>`}
        <button class="delete-btn" onclick="event.stopPropagation();deleteItem('${esc(f.name)}',${f.is_dir})">✕</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function navigateTo(name) {
  currentPath = currentPath ? currentPath + '/' + name : name;
  loadFiles();
}

function downloadFile(name) {
  const shareEnc = encodeURIComponent(currentShare);
  const pathEnc = currentPath ? currentPath.split('/').map(p => encodeURIComponent(p)).join('/') : '';
  const url = pathEnc ? `/${shareEnc}/${pathEnc}/${encodeURIComponent(name)}` : `/${shareEnc}/${encodeURIComponent(name)}`;
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
}

function downloadZip(name) {
  const shareEnc = encodeURIComponent(currentShare);
  const pathEnc = currentPath ? currentPath.split('/').map(p => encodeURIComponent(p)).join('/') : '';
  const url = pathEnc ? `/api/zip/${shareEnc}/${pathEnc}/${encodeURIComponent(name)}` : `/api/zip/${shareEnc}/${encodeURIComponent(name)}`;
  const a = document.createElement('a');
  a.href = url;
  a.download = name + '.zip';
  a.click();
}

async function deleteItem(name, isDir) {
  if (!confirm(`Delete "${name}"?`)) return;
  const shareEnc = encodeURIComponent(currentShare);
  const pathEnc = currentPath ? currentPath.split('/').map(p => encodeURIComponent(p)).join('/') : '';
  const url = pathEnc ? `/${shareEnc}/${pathEnc}/${encodeURIComponent(name)}` : `/${shareEnc}/${encodeURIComponent(name)}`;
  try {
    const res = await api(url, { method: 'DELETE' });
    if (res.ok || res.status === 204) {
      showToast(`Deleted "${name}"`, 'success');
      await loadFiles();
    } else {
      showToast('Delete failed: ' + (await res.text()), 'error');
    }
  } catch (e) {
    showToast('Delete failed: ' + e.message, 'error');
  }
}

async function uploadFiles(files) {
  if (!files.length) return;
  for (const file of files) {
    const shareEnc = encodeURIComponent(currentShare);
    const pathEnc = currentPath ? currentPath.split('/').map(p => encodeURIComponent(p)).join('/') : '';
    const url = pathEnc ? `/${shareEnc}/${pathEnc}/${encodeURIComponent(file.name)}` : `/${shareEnc}/${encodeURIComponent(file.name)}`;
    try {
      const res = await api(url, { method: 'PUT', body: file });
      if (!res.ok && res.status !== 201 && res.status !== 204) {
        showToast(`Failed to upload "${file.name}"`, 'error');
      }
    } catch (e) {
      showToast(`Upload failed: ${e.message}`, 'error');
    }
  }
  showToast('Upload complete', 'success');
  await loadFiles();
}

async function showNewFolderModal() {
  const container = document.getElementById('modal-container');
  container.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>New Folder</h3>
      <input type="text" id="new-folder-name" placeholder="Folder name" autofocus>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="createFolder()">Create</button>
      </div>
    </div>
  </div>`;
  document.getElementById('new-folder-name').focus();
}

async function createFolder() {
  const name = document.getElementById('new-folder-name').value.trim();
  if (!name) return;
  const shareEnc = encodeURIComponent(currentShare);
  const pathEnc = currentPath ? currentPath.split('/').map(p => encodeURIComponent(p)).join('/') : '';
  const url = pathEnc ? `/${shareEnc}/${pathEnc}/${encodeURIComponent(name)}` : `/${shareEnc}/${encodeURIComponent(name)}`;
  try {
    const res = await api(url, { method: 'MKCOL' });
    if (res.ok || res.status === 201) {
      showToast('Folder created', 'success');
      closeModal();
      await loadFiles();
    } else {
      showToast('Failed to create folder', 'error');
    }
  } catch (e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

function updateBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  let html = `<a onclick="browseShare('${esc(currentShare)}')">${esc(currentShare)}</a>`;
  if (currentPath) {
    const parts = currentPath.split('/');
    let acc = '';
    parts.forEach((p, i) => {
      html += `<span class="sep">/</span>`;
      acc = acc ? acc + '/' + p : p;
      if (i < parts.length - 1) {
        html += `<a onclick="navigateToBreadcrumb('${esc(acc)}')">${esc(p)}</a>`;
      } else {
        html += `<span>${esc(p)}</span>`;
      }
    });
  }
  el.innerHTML = html;
}

function navigateToBreadcrumb(path) {
  currentPath = path;
  loadFiles();
}

function showToast(msg, type = 'success') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  const icon = type === 'success' ? '✓' : '✕';
  toast.innerHTML = `<span class="toast-icon">${icon}</span>${esc(msg)}`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(() => toast.remove(), 300); }, 3000);
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = { txt:'📄', pdf:'📕', doc:'📘', docx:'📘', xls:'📗', xlsx:'📗', ppt:'📙', pptx:'📙', jpg:'🖼', jpeg:'🖼', png:'🖼', gif:'🖼', svg:'🖼', mp3:'🎵', wav:'🎵', mp4:'🎬', avi:'🎬', mov:'🎬', zip:'📦', rar:'📦', gz:'📦', tar:'📦', js:'🟨', ts:'🟦', rs:'🦀', py:'🐍', html:'🌐', css:'🎨', json:'📋', xml:'📋', md:'📝' };
  return icons[ext] || '📄';
}

function formatSize(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ---- Device Management ----
async function loadDevices() {
  const el = document.getElementById('devices-list');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const res = await api('/api/devices');
    if (!res.ok) throw new Error('Failed to load');
    const devices = await res.json();
    renderDevices(devices);
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div>Error: ${esc(e.message)}</div>`;
  }
}

function renderDevices(devices) {
  const el = document.getElementById('devices-list');
  if (devices.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📱</div>No devices connected yet</div>';
    return;
  }
  let html = '<table class="device-table"><thead><tr><th>Device</th><th>IP</th><th>Hostname</th><th>Last Seen</th><th>View</th><th>Edit</th><th>Delete</th><th>Status</th><th></th></tr></thead><tbody>';
  devices.forEach(d => {
    const isBlocked = d.blocked;
    const statusClass = isBlocked ? 'blocked' : 'allowed';
    const statusText = isBlocked ? 'Blocked' : 'Allowed';
    const btnClass = isBlocked ? 'block-btn blocked' : 'block-btn';
    const btnText = isBlocked ? 'Unblock' : 'Block';
    const shortName = d.name.length > 50 ? d.name.substring(0, 50) + '…' : d.name;
    const displayHostname = d.hostname || '—';
    html += `<tr>
      <td class="device-name" title="${esc(d.name)}">${esc(shortName)}</td>
      <td class="device-ip">${esc(d.ip)}</td>
      <td class="device-hostname">${esc(displayHostname)}</td>
      <td style="color:var(--text2);font-size:12px">${esc(d.last_seen)}</td>
      <td><input type="checkbox" class="perm-check" ${d.view?'checked':''} onchange="updatePerm('${esc(d.ip)}','view',this.checked,event)"></td>
      <td><input type="checkbox" class="perm-check" ${d.edit?'checked':''} onchange="updatePerm('${esc(d.ip)}','edit',this.checked,event)"></td>
      <td><input type="checkbox" class="perm-check" ${d.delete?'checked':''} onchange="updatePerm('${esc(d.ip)}','delete',this.checked,event)"></td>
      <td><span class="device-status ${statusClass}">${statusText}</span></td>
      <td>${d.is_self ? '<span style="color:var(--text2);font-size:12px">This device</span>' : `<button class="${btnClass}" onclick="toggleBlock('${esc(d.ip)}',${isBlocked})">${btnText}</button>`}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

async function toggleBlock(ip, isBlocked) {
  const endpoint = isBlocked ? 'unblock' : 'block';
  try {
    const res = await api(`/api/devices/${endpoint}/${encodeURIComponent(ip)}`, { method: 'POST' });
    if (res.ok) {
      showToast(isBlocked ? 'Unblocked' : 'Blocked', 'success');
      await loadDevices();
    } else {
      showToast('Operation failed', 'error');
    }
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function updatePerm(ip, perm, value, evt) {
  const row = evt.target.closest('tr');
  const checks = row ? row.querySelectorAll('.perm-check') : [];
  const body = {
    view: checks[0] ? checks[0].checked : true,
    edit: checks[1] ? checks[1].checked : true,
    delete: checks[2] ? checks[2].checked : true,
  };
  try {
    const res = await api(`/api/devices/permissions/${encodeURIComponent(ip)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) showToast('Failed to update permission', 'error');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// ---- Realtime (inside Device Management) ----
async function loadRealtime() {
  const el = document.getElementById('realtime-section');
  try {
    const res = await api('/api/devices/online');
    if (!res.ok) throw new Error('Failed');
    const devices = await res.json();
    renderRealtime(devices);
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div>Error: ${esc(e.message)}</div>`;
  }
}

function renderRealtime(devices) {
  const el = document.getElementById('realtime-section');
  const count = devices.length;
  let html = `<div class="rt-counter"><span class="count">${count}</span><span class="label">device${count !== 1 ? 's' : ''} online</span></div>`;
  if (count === 0) {
    html += '<div class="empty-state" style="padding:20px"><div class="icon">🔴</div>No devices currently connected</div>';
    el.innerHTML = html;
    return;
  }
  html += '<div class="realtime-grid">';
  devices.forEach(d => {
    const hostnameDisplay = d.hostname || d.ip;
    const agentDisplay = d.name && d.name !== 'Unknown' ? d.name : '';
    html += `<div class="rt-card online">
      <span class="rt-indicator online"></span>
      <div class="rt-hostname">${esc(hostnameDisplay)}</div>
      <div class="rt-ip">${esc(d.ip)}</div>
      ${agentDisplay ? `<div class="rt-agent">${esc(agentDisplay)}</div>` : ''}
      <div class="rt-time">Last seen: ${esc(d.last_seen)}</div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// ---- Events ----
const evtSource = new EventSource('/api/events');
let lastRefresh = 0;
evtSource.onmessage = (e) => {
  if (e.data === 'refresh') {
    const now = Date.now();
    if (now - lastRefresh > 500) {
      lastRefresh = now;
      const fb = document.getElementById('file-browser');
      if (fb && fb.classList.contains('active')) {
        loadFiles();
      } else {
        loadShares();
      }
    }
  }
};
evtSource.onerror = () => console.log('SSE connection error');

loadShares();
</script>
</body>
</html>
