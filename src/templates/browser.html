<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DriveShare</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232736;
      --border: #2e3348;
      --text: #e1e4f0;
      --text2: #8b90a8;
      --accent: #6c8cff;
      --accent2: #5a7ae6;
      --danger: #ff5c5c;
      --success: #4ade80;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0, 0, 0, .4)
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px
    }

    header h1 {
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px
    }

    header h1 span {
      color: var(--accent)
    }

    .header-info {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: var(--text2);
      flex-wrap: wrap
    }

    .hostname-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      color: var(--accent)
    }

    .container {
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 16px;
      flex-wrap: wrap
    }

    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer
    }

    .breadcrumb a:hover {
      text-decoration: underline
    }

    .breadcrumb .sep {
      color: var(--border);
      margin: 0 2px
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap
    }

    .toolbar button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .toolbar button:hover {
      border-color: var(--accent);
      background: var(--surface)
    }

    .toolbar input[type=file] {
      display: none
    }

    #drop-zone {
      position: relative
    }

    #drop-zone.dragover::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px dashed var(--accent);
      border-radius: var(--radius);
      background: rgba(108, 140, 255, .08);
      z-index: 100;
      pointer-events: none
    }

    .file-table {
      width: 100%;
      border-collapse: collapse
    }

    .file-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      white-space: nowrap
    }

    .file-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px
    }

    .file-table tr {
      cursor: pointer;
      transition: background .2s
    }

    .file-table tr:hover {
      background: var(--surface2)
    }

    .file-table .file-icon {
      margin-right: 10px;
      font-size: 16px;
      flex-shrink: 0
    }

    .file-table .file-name {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .file-table .file-name-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .file-table .file-size {
      color: var(--text2);
      font-size: 13px;
      white-space: nowrap
    }

    .file-table .file-date {
      color: var(--text2);
      font-size: 13px;
      white-space: nowrap
    }

    .file-table .file-actions {
      display: flex;
      gap: 6px;
      white-space: nowrap
    }

    .file-table .file-actions button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all .2s
    }

    .file-table .file-actions button:hover {
      color: var(--text);
      border-color: var(--accent)
    }

    .file-table .file-actions .delete-btn:hover {
      color: var(--danger);
      border-color: var(--danger)
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2)
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px
    }

    .empty-state p {
      font-size: 14px
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text2);
      gap: 10px
    }

    .loading .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 400px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .6)
    }

    .modal h3 {
      margin-bottom: 16px;
      font-size: 17px
    }

    .modal input,
    .modal .rename-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 16px;
      outline: none
    }

    .modal input:focus,
    .modal .rename-input:focus {
      border-color: var(--accent)
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end
    }

    .modal-actions button {
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all .2s
    }

    .modal-actions .btn-cancel {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2)
    }

    .modal-actions .btn-cancel:hover {
      color: var(--text)
    }

    .modal-actions .btn-primary {
      background: var(--accent);
      border: none;
      color: #fff;
      font-weight: 600
    }

    .modal-actions .btn-primary:hover {
      background: var(--accent2)
    }

    .modal-actions .btn-danger {
      background: var(--danger);
      border: none;
      color: #fff;
      font-weight: 600
    }

    .modal-actions .btn-danger:hover {
      background: #e04848
    }

    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 300
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      margin-top: 8px;
      box-shadow: var(--shadow);
      animation: slideIn .3s ease;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 400px
    }

    .toast.success {
      border-left: 3px solid var(--success)
    }

    .toast.error {
      border-left: 3px solid var(--danger)
    }

    .toast .toast-icon {
      font-size: 18px
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0
      }

      to {
        transform: translateX(0);
        opacity: 1
      }
    }

    @media(max-width:768px) {
      body {
        overflow-x: hidden
      }

      .container {
        padding: 12px
      }

      header {
        padding: 12px 16px;
        gap: 8px;
        align-items: flex-start
      }

      header h1 {
        font-size: 16px
      }

      .header-info {
        font-size: 11px;
        gap: 8px
      }

      .hostname-box {
        font-size: 11px;
        padding: 5px 10px;
        word-break: break-all;
        max-width: 100%
      }

      .breadcrumb {
        font-size: 13px;
        margin-bottom: 12px
      }

      .toolbar {
        gap: 8px;
        margin-bottom: 12px
      }

      .toolbar button {
        padding: 10px 12px;
        font-size: 12px
      }

      .file-table {
        min-width: 680px
      }

      .file-table th,
      .file-table td {
        padding: 10px 12px
      }

      .file-table .file-name-text {
        max-width: 180px
      }

      .file-table .file-actions {
        gap: 4px
      }

      .file-table .file-actions button {
        padding: 5px 7px
      }

      .empty-state {
        padding: 42px 14px
      }

      .modal {
        width: calc(100vw - 24px);
        max-width: none;
        padding: 18px
      }

      .toast-container {
        left: 12px;
        right: 12px;
        bottom: 12px
      }

      .toast {
        max-width: none
      }
    }
  </style>
</head>

<body>

  <header>
    <h1><span>◉</span> DriveShare</h1>
    <div class="header-info">
      Host: <span class="hostname-box" id="hostname-display">loading...</span>
    </div>
  </header>

  <div class="container">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="toolbar" id="drop-zone">
      <button onclick="document.getElementById('upload-input').click()">Upload</button>
      <input type="file" id="upload-input" multiple onchange="uploadFiles(this.files)">
      <button onclick="showNewFolderModal()">New Folder</button>
    </div>
    <div id="file-list">
      <div class="loading">
        <div class="spinner"></div>Loading...
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <div id="modal-container"></div>

  <script>
    const shareName = window.location.pathname.replace(/\/$/, '').split('/')[1] || '';
    let currentPath = decodeURIComponent(window.location.pathname.replace(/\/$/, '').split('/').slice(2).join('/'));

    let hostname = 'localhost';
    let port = '8080';

    (async function initServerIp() {
      try {
        const res = await fetch('/api/ip');
        if (res.ok) {
          const data = await res.json();
          hostname = data.ip || hostname;
          port = String(data.port) || port;
        }
      } catch (_) { }
      document.getElementById('hostname-display').textContent = hostname + ':' + port;
    })();

    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
    });

    async function api(path, opts = {}) {
      const res = await fetch(path, opts);
      if (!res.ok) {
        const text = await res.text().catch(() => 'Request failed');
        throw new Error(text || `HTTP ${res.status}`);
      }
      return res;
    }

    async function loadFiles() {
      const el = document.getElementById('file-list');
      el.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
      updateBreadcrumb();
      try {
        const pathEnc = currentPath ? currentPath.split('/').filter(Boolean).map(p => encodeURIComponent(p)).join('/') : '';
        const url = pathEnc ? `/api/files/${encodeURIComponent(shareName)}/${pathEnc}` : `/api/files/${encodeURIComponent(shareName)}`;
        const res = await api(url);
        const files = await res.json();
        renderFiles(files);
      } catch (e) {
        el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${esc(e.message)}</p></div>`;
      }
    }

    function renderFiles(files) {
      const el = document.getElementById('file-list');
      if (files.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>This folder is empty</p></div>';
        return;
      }
      let html = '<table class="file-table"><thead><tr><th>Name</th><th>Size</th><th>Modified</th><th></th></tr></thead><tbody>';
      files.forEach(f => {
        const icon = f.is_dir ? '📁' : getFileIcon(f.name);
        const size = f.is_dir ? '—' : formatSize(f.size);
        html += `<tr>
      <td class="file-name" onclick="${f.is_dir ? `navigateTo('${esc(f.name)}')` : `downloadFile('${esc(f.name)}')`}">
        <span class="file-icon">${icon}</span>
        <span class="file-name-text">${esc(f.name)}</span>
      </td>
      <td class="file-size">${size}</td>
      <td class="file-date">${f.modified || '—'}</td>
      <td class="file-actions">
        <button onclick="event.stopPropagation();renameItem('${esc(f.name)}',${f.is_dir})" title="Rename">✎</button>
        ${f.is_dir ? `<button onclick="event.stopPropagation();downloadZip('${esc(f.name)}')" title="Download as ZIP">📦</button>` : `<button onclick="event.stopPropagation();downloadFile('${esc(f.name)}')" title="Download">⬇</button>`}
        <button class="delete-btn" onclick="event.stopPropagation();deleteItem('${esc(f.name)}',${f.is_dir})" title="Delete">✕</button>
      </td>
    </tr>`;
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    }

    function navigateTo(name) {
      currentPath = currentPath ? currentPath + '/' + name : name;
      history.pushState(null, '', '/' + shareName + '/' + currentPath);
      loadFiles();
    }

    function downloadFile(name) {
      const pathEnc = currentPath ? currentPath.split('/').filter(Boolean).map(p => encodeURIComponent(p)).join('/') : '';
      const url = pathEnc ? `/${encodeURIComponent(shareName)}/${pathEnc}/${encodeURIComponent(name)}` : `/${encodeURIComponent(shareName)}/${encodeURIComponent(name)}`;
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      a.click();
    }

    async function uploadFiles(files) {
      if (!files.length) return;
      const total = files.length;
      let completed = 0;
      for (const file of files) {
        const pathEnc = currentPath ? currentPath.split('/').filter(Boolean).map(p => encodeURIComponent(p)).join('/') : '';
        const url = pathEnc ? `/${encodeURIComponent(shareName)}/${pathEnc}/${encodeURIComponent(file.name)}` : `/${encodeURIComponent(shareName)}/${encodeURIComponent(file.name)}`;
        try {
          const res = await fetch(url, { method: 'PUT', body: file });
          if (res.ok || res.status === 201 || res.status === 204) {
            completed++;
          } else {
            showToast(`Failed to upload "${file.name}"`, 'error');
          }
        } catch (e) {
          showToast(`Upload failed: "${file.name}"`, 'error');
        }
      }
      if (completed > 0) {
        showToast(`Uploaded ${completed}/${total} file${completed > 1 ? 's' : ''}`, 'success');
      }
      await loadFiles();
    }

    function downloadZip(name) {
      const pathEnc = currentPath ? currentPath.split('/').filter(Boolean).map(p => encodeURIComponent(p)).join('/') : '';
      const url = pathEnc ? `/api/zip/${encodeURIComponent(shareName)}/${pathEnc}/${encodeURIComponent(name)}` : `/api/zip/${encodeURIComponent(shareName)}/${encodeURIComponent(name)}`;
      const a = document.createElement('a');
      a.href = url;
      a.download = name + '.zip';
      a.click();
    }

    async function deleteItem(name, isDir) {
      if (!confirm(`Delete "${name}"?`)) return;
      const pathEnc = currentPath ? currentPath.split('/').filter(Boolean).map(p => encodeURIComponent(p)).join('/') : '';
      const url = pathEnc ? `/${encodeURIComponent(shareName)}/${pathEnc}/${encodeURIComponent(name)}` : `/${encodeURIComponent(shareName)}/${encodeURIComponent(name)}`;
      try {
        const res = await fetch(url, { method: 'DELETE' });
        if (res.ok || res.status === 204) {
          showToast(`Deleted "${name}"`, 'success');
          await loadFiles();
        } else {
          showToast('Delete failed', 'error');
        }
      } catch (e) {
        showToast('Delete failed: ' + e.message, 'error');
      }
    }

    let renameTarget = null;

    function renameItem(name, isDir) {
      renameTarget = { name, isDir };
      const container = document.getElementById('modal-container');
      container.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Rename</h3>
      <input type="text" class="rename-input" id="rename-input" value="${esc(name)}" autofocus>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="doRename()">Rename</button>
      </div>
    </div>
  </div>`;
      const input = document.getElementById('rename-input');
      input.focus();
      input.setSelectionRange(0, name.lastIndexOf('.') > 0 ? name.lastIndexOf('.') : name.length);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') doRename(); if (e.key === 'Escape') closeModal(); });
    }

    async function doRename() {
      if (!renameTarget) return;
      const newName = document.getElementById('rename-input').value.trim();
      if (!newName || newName === renameTarget.name) { closeModal(); return; }
      const pathEnc = currentPath ? currentPath.split('/').filter(Boolean).map(p => encodeURIComponent(p)).join('/') : '';
      const srcUrl = pathEnc ? `/${encodeURIComponent(shareName)}/${pathEnc}/${encodeURIComponent(renameTarget.name)}` : `/${encodeURIComponent(shareName)}/${encodeURIComponent(renameTarget.name)}`;
      const dstUrl = pathEnc ? `/${encodeURIComponent(shareName)}/${pathEnc}/${encodeURIComponent(newName)}` : `/${encodeURIComponent(shareName)}/${encodeURIComponent(newName)}`;
      try {
        const res = await fetch(srcUrl, { method: 'MOVE', headers: { 'Destination': window.location.origin + dstUrl, 'Overwrite': 'F' } });
        if (res.ok || res.status === 201 || res.status === 204) {
          showToast(`Renamed to "${newName}"`, 'success');
          closeModal();
          await loadFiles();
        } else {
          showToast('Rename failed', 'error');
        }
      } catch (e) {
        showToast('Rename failed: ' + e.message, 'error');
      }
    }

    function showNewFolderModal() {
      const container = document.getElementById('modal-container');
      container.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>New Folder</h3>
      <input type="text" id="new-folder-name" placeholder="Folder name" autofocus>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="createFolder()">Create</button>
      </div>
    </div>
  </div>`;
      const input = document.getElementById('new-folder-name');
      input.focus();
      input.addEventListener('keydown', e => { if (e.key === 'Enter') createFolder(); if (e.key === 'Escape') closeModal(); });
    }

    async function createFolder() {
      const name = document.getElementById('new-folder-name').value.trim();
      if (!name) return;
      const pathEnc = currentPath ? currentPath.split('/').filter(Boolean).map(p => encodeURIComponent(p)).join('/') : '';
      const url = pathEnc ? `/${encodeURIComponent(shareName)}/${pathEnc}/${encodeURIComponent(name)}` : `/${encodeURIComponent(shareName)}/${encodeURIComponent(name)}`;
      try {
        const res = await fetch(url, { method: 'MKCOL' });
        if (res.ok || res.status === 201) {
          showToast('Folder created', 'success');
          closeModal();
          await loadFiles();
        } else {
          const text = await res.text().catch(() => '');
          showToast(text || 'Failed to create folder', 'error');
        }
      } catch (e) {
        showToast('Failed: ' + e.message, 'error');
      }
    }

    function closeModal() {
      document.getElementById('modal-container').innerHTML = '';
      renameTarget = null;
    }

    function updateBreadcrumb() {
      const el = document.getElementById('breadcrumb');
      let html = `<a href="/">Drives</a><span class="sep">/</span>`;
      html += `<a href="/${encodeURIComponent(shareName)}/">${esc(shareName)}</a>`;
      if (currentPath) {
        const parts = currentPath.split('/').filter(Boolean);
        let acc = '';
        parts.forEach((p, i) => {
          acc = acc ? acc + '/' + p : p;
          html += `<span class="sep">/</span>`;
          if (i < parts.length - 1) {
            html += `<a href="/${encodeURIComponent(shareName)}/${encodeURIComponent(acc)}/">${esc(p)}</a>`;
          } else {
            html += `<span>${esc(p)}</span>`;
          }
        });
      }
      el.innerHTML = html;
    }

    function showToast(msg, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      const icon = type === 'success' ? '✓' : '✕';
      toast.innerHTML = `<span class="toast-icon">${icon}</span>${esc(msg)}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity .3s';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function getFileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const icons = { txt: '📄', pdf: '📕', doc: '📘', docx: '📘', xls: '📗', xlsx: '📗', ppt: '📙', pptx: '📙', jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼', svg: '🖼', mp3: '🎵', wav: '🎵', mp4: '🎬', avi: '🎬', mov: '🎬', zip: '📦', rar: '📦', gz: '📦', tar: '📦', js: '🟨', ts: '🟦', rs: '🦀', py: '🐍', html: '🌐', css: '🎨', json: '📋', xml: '📋', md: '📝', lock: '🔒', toml: '⚙️', yaml: '⚙️', yml: '⚙️', conf: '⚙️', ini: '⚙️', sh: '💻', bat: '💻', exe: '⚡', deb: '📦', rpm: '📦', iso: '💿', img: '💿' };
      return icons[ext] || '📄';
    }

    function formatSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    window.addEventListener('popstate', () => {
      currentPath = decodeURIComponent(window.location.pathname.replace(/\/$/, '').split('/').slice(2).join('/'));
      loadFiles();
    });

    const evtSource = new EventSource('/api/events');
    evtSource.onmessage = (e) => {
      if (e.data === 'refresh') loadFiles();
    };
    evtSource.onerror = () => console.log('SSE connection error');

    loadFiles();
  </script>
</body>
