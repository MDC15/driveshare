name: Build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            name: linux-x64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            name: linux-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            name: windows-x64

          - target: i686-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            name: windows-x86

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            name: windows-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
            name: macos-x64

          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
            name: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile deps (Linux ARM64)
        if: contains(matrix.target, 'aarch64-unknown-linux-gnu')
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy config.toml
        run: cp config.toml target/${{ matrix.target }}/release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: driveshare-${{ matrix.name }}
          path: |
            target/${{ matrix.target }}/release/driveshare${{ matrix.ext }}
            target/${{ matrix.target }}/release/config.toml
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create release archives
        run: |
          mkdir dist
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if echo "$name" | grep -q windows; then
              (cd "$dir" && zip -r "../../dist/$name.zip" .)
            else
              (cd "$dir" && tar czf "../../dist/$name.tar.gz" .)
            fi
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
